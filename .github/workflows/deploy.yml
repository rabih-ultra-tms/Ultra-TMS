name: Deploy

on:
  workflow_run:
    workflows: ['CI']
    types: [completed]
    branches: [main]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Deploy environment'
        required: true
        default: 'staging'
        type: choice
        options:
          - staging
          - production

concurrency:
  group: deploy-${{ github.event.inputs.environment || 'staging' }}
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  API_IMAGE: ghcr.io/${{ github.repository }}/api
  WEB_IMAGE: ghcr.io/${{ github.repository }}/web

jobs:
  docker-build:
    name: Build & Push Docker Images
    runs-on: ubuntu-latest
    if: >
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success')
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          SHA_SHORT=$(echo "${{ github.sha }}" | cut -c1-7)
          echo "sha_short=$SHA_SHORT" >> "$GITHUB_OUTPUT"
          echo "timestamp=$(date -u +%Y%m%d%H%M%S)" >> "$GITHUB_OUTPUT"

      - name: Build and push API image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/api/Dockerfile
          push: true
          tags: |
            ${{ env.API_IMAGE }}:sha-${{ steps.meta.outputs.sha_short }}
            ${{ env.API_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push Web image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: |
            ${{ env.WEB_IMAGE }}:sha-${{ steps.meta.outputs.sha_short }}
            ${{ env.WEB_IMAGE }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

    outputs:
      image_tag: sha-${{ steps.meta.outputs.sha_short }}

  migrate:
    name: Run Database Migrations
    runs-on: ubuntu-latest
    needs: [docker-build]
    environment: ${{ github.event.inputs.environment || 'staging' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: '9.0.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Run migrations
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: pnpm --filter api prisma:migrate deploy

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    needs: [docker-build, migrate]
    if: github.event.inputs.environment != 'production'
    environment:
      name: staging
      url: ${{ vars.STAGING_URL }}
    steps:
      - name: Deploy notification
        run: |
          echo "Deploying to staging..."
          echo "API image: ${{ env.API_IMAGE }}:${{ needs.docker-build.outputs.image_tag }}"
          echo "Web image: ${{ env.WEB_IMAGE }}:${{ needs.docker-build.outputs.image_tag }}"
          echo ""
          echo "To deploy manually with docker-compose:"
          echo "  export API_TAG=${{ needs.docker-build.outputs.image_tag }}"
          echo "  export WEB_TAG=${{ needs.docker-build.outputs.image_tag }}"
          echo "  docker compose -f docker-compose.prod.yml pull"
          echo "  docker compose -f docker-compose.prod.yml up -d"
          echo ""
          echo "NOTE: Replace this step with your actual deployment command"
          echo "(e.g., kubectl set image, aws ecs update-service, ssh docker-compose pull+up)"

  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    needs: [docker-build, migrate]
    if: github.event.inputs.environment == 'production'
    environment:
      name: production
      url: ${{ vars.PRODUCTION_URL }}
    steps:
      - name: Deploy notification
        run: |
          echo "Deploying to production..."
          echo "API image: ${{ env.API_IMAGE }}:${{ needs.docker-build.outputs.image_tag }}"
          echo "Web image: ${{ env.WEB_IMAGE }}:${{ needs.docker-build.outputs.image_tag }}"
          echo ""
          echo "NOTE: Replace this step with your actual production deployment command"
