name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'
  PNPM_VERSION: '9.0.0'

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ultra_tms_test
      JWT_SECRET: test-jwt-secret-for-ci
      REDIS_URL: redis://localhost:6379
      CARRIER_PORTAL_JWT_SECRET: test-carrier-portal-secret
      CUSTOMER_PORTAL_JWT_SECRET: test-customer-portal-secret
      PORTAL_JWT_SECRET: test-portal-secret
      ELASTIC_NODE: http://localhost:9200
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: pnpm check-types

  test:
    name: Test
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ultra_tms_test
      JWT_SECRET: test-jwt-secret-for-ci
      REDIS_URL: redis://localhost:6379
      CARRIER_PORTAL_JWT_SECRET: test-carrier-portal-secret
      CUSTOMER_PORTAL_JWT_SECRET: test-customer-portal-secret
      PORTAL_JWT_SECRET: test-portal-secret
      ELASTIC_NODE: http://localhost:9200
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: ultra_tms_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Run API unit tests
        run: pnpm --filter api test:unit

      - name: Run Web tests
        run: pnpm --filter web test --passWithNoTests

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-and-typecheck, test]
    env:
      DATABASE_URL: postgresql://postgres:postgres@localhost:5432/ultra_tms_test
      JWT_SECRET: test-jwt-secret-for-ci
      REDIS_URL: redis://localhost:6379
      CARRIER_PORTAL_JWT_SECRET: test-carrier-portal-secret
      CUSTOMER_PORTAL_JWT_SECRET: test-customer-portal-secret
      PORTAL_JWT_SECRET: test-portal-secret
      ELASTIC_NODE: http://localhost:9200
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Generate Prisma client
        run: pnpm --filter api prisma:generate

      - name: Build all apps
        run: pnpm build
