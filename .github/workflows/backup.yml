name: Database Backup

on:
  schedule:
    # Daily at 2:00 AM UTC
    - cron: '0 2 * * *'
  workflow_dispatch:
    inputs:
      backup_type:
        description: 'Backup type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - weekly
          - monthly

jobs:
  backup:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - name: Make scripts executable
        run: chmod +x scripts/backup/*.sh

      - name: Determine backup type
        id: type
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "backup_type=${{ inputs.backup_type }}" >> "$GITHUB_OUTPUT"
          else
            # Scheduled run: determine type from day
            DOW=$(date +%u)  # 1=Monday, 7=Sunday
            DOM=$(date +%d)  # Day of month
            if [ "$DOM" = "01" ]; then
              echo "backup_type=monthly" >> "$GITHUB_OUTPUT"
            elif [ "$DOW" = "7" ]; then
              echo "backup_type=weekly" >> "$GITHUB_OUTPUT"
            else
              echo "backup_type=daily" >> "$GITHUB_OUTPUT"
            fi
          fi

      - name: Run backup
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          BACKUP_DIR: ./backups
        run: ./scripts/backup/pg-backup.sh ${{ steps.type.outputs.backup_type }}

      - name: Verify backup
        run: |
          BACKUP_FILE=$(ls -t backups/${{ steps.type.outputs.backup_type }}/*.sql.gz | head -1)
          ./scripts/backup/pg-verify.sh "$BACKUP_FILE"

      - name: Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: db-backup-${{ steps.type.outputs.backup_type }}-${{ github.run_number }}
          path: backups/
          retention-days: 30

      - name: Upload to S3 (if configured)
        if: env.AWS_ACCESS_KEY_ID != ''
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: ${{ secrets.AWS_REGION || 'us-east-1' }}
          S3_BUCKET: ${{ secrets.BACKUP_S3_BUCKET }}
        run: |
          BACKUP_FILE=$(ls -t backups/${{ steps.type.outputs.backup_type }}/*.sql.gz | head -1)
          aws s3 cp "$BACKUP_FILE" "s3://${S3_BUCKET}/ultra-tms-backups/${{ steps.type.outputs.backup_type }}/"
