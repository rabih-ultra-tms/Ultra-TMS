version: 2
updates:
  # Root monorepo dependencies
  - package-ecosystem: 'npm'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 10
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'

  # API app dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/api'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'api'

  # Web app dependencies
  - package-ecosystem: 'npm'
    directory: '/apps/web'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      minor-and-patch:
        update-types:
          - 'minor'
          - 'patch'
    labels:
      - 'dependencies'
      - 'web'

  # GitHub Actions
  - package-ecosystem: 'github-actions'
    directory: '/'
    schedule:
      interval: 'weekly'
      day: 'monday'
    open-pull-requests-limit: 5
    groups:
      actions:
        patterns:
          - '*'
    labels:
      - 'dependencies'
      - 'ci'
