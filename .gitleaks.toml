title = "Ultra-TMS Gitleaks Configuration"

[allowlist]
  description = "Allow example files and test files"
  paths = [
    '''.env\.example''',
    '''\.spec\.ts$''',
    '''\.test\.ts$''',
    '''\.test\.tsx$''',
    '''dev_docs/''',
    '''dev_docs_v2/''',
    '''dev_docs_v3/''',
    '''docs/''',
  ]

# Override default rules with project-specific patterns

[[rules]]
  id = "generic-api-key"
  description = "Generic API Key"
  regex = '''(?i)(api[_-]?key|apikey)\s*[:=]\s*['"][a-zA-Z0-9]{20,}['"]'''
  tags = ["key", "API"]

[[rules]]
  id = "jwt-secret"
  description = "JWT Secret"
  regex = '''(?i)(jwt[_-]?secret)\s*[:=]\s*['"][a-zA-Z0-9/+]{16,}['"]'''
  tags = ["key", "JWT"]

[[rules]]
  id = "aws-access-key"
  description = "AWS Access Key ID"
  regex = '''AKIA[0-9A-Z]{16}'''
  tags = ["key", "AWS"]

[[rules]]
  id = "aws-secret-key"
  description = "AWS Secret Access Key"
  regex = '''(?i)aws_secret_access_key\s*[:=]\s*['"][a-zA-Z0-9/+=]{40}['"]'''
  tags = ["key", "AWS"]

[[rules]]
  id = "database-url-with-password"
  description = "Database URL with embedded password"
  regex = '''(?i)(postgres|mysql|mongodb)://[^:]+:[^@\s]{8,}@[^\s]+'''
  tags = ["database", "credentials"]

  [rules.allowlist]
    regexes = [
      '''postgres://postgres:postgres@''',
      '''localhost''',
      '''127\.0\.0\.1''',
    ]

[[rules]]
  id = "sendgrid-api-key"
  description = "SendGrid API Key"
  regex = '''SG\.[a-zA-Z0-9_-]{22}\.[a-zA-Z0-9_-]{43}'''
  tags = ["key", "SendGrid"]

[[rules]]
  id = "twilio-api-key"
  description = "Twilio API Key"
  regex = '''SK[a-f0-9]{32}'''
  tags = ["key", "Twilio"]

[[rules]]
  id = "private-key"
  description = "Private Key"
  regex = '''-----BEGIN (RSA |EC |DSA |OPENSSH )?PRIVATE KEY-----'''
  tags = ["key", "private"]

[[rules]]
  id = "generic-password-assignment"
  description = "Hardcoded password assignment"
  regex = '''(?i)(password|passwd|pwd)\s*[:=]\s*['"][^'"]{8,}['"]'''
  tags = ["password"]

  [rules.allowlist]
    regexes = [
      '''postgres''',
      '''redis_password''',
      '''placeholder''',
      '''example''',
      '''changeme''',
      '''your_.*_here''',
      '''password123''',
    ]
